name: Issue QA Gate

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  qa-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.issue.pull_request == null

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run QA gate
        id: qa_gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          STORY_TEXT: ${{ github.event.issue.body }}
        run: |
          set +e
          python run_ci.py > qa_report.txt 2>&1
          status=$?
          {
            echo "report<<EOF"
            cat qa_report.txt
            echo "EOF"
            echo "status=$status"
          } >> "$GITHUB_OUTPUT"
          cat qa_report.txt >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Comment report on issue
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          QA_REPORT: ${{ steps.qa_gate.outputs.report }}
          QA_STATUS: ${{ steps.qa_gate.outputs.status }}
        with:
          script: |
            const report = process.env.QA_REPORT;
            const status = process.env.QA_STATUS === '0' ? 'PASS' : 'FAIL';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## QA Gate: ${status}\n\n\`\`\`text\n${report}\n\`\`\``
            });
